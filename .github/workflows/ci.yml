name: CI

'on':
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.3
          cache: npm

      - name: Enable rtk command prefix
        run: |
          sudo tee /usr/local/bin/rtk >/dev/null <<'EOF'
          #!/usr/bin/env bash
          exec "$@"
          EOF
          sudo chmod +x /usr/local/bin/rtk

      - name: Install dependencies
        run: npm ci

      - name: Run UI tests
        run: rtk npm test -- --watch=false

      - name: Run server tests
        run: rtk npm run test:server

      - name: Build production bundle
        run: rtk npm run build:production
