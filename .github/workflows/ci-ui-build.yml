name: UI Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build
