@if (!focusMode.active()) {
  <a class="skip-link" href="#main-content">Skip to main content</a>
}
<div class="site-shell" [class.site-shell--focused]="focusMode.active()">
  @if (!focusMode.active()) {
    <app-site-header />
  }

  <main id="main-content">
    <router-outlet />
  </main>

  @if (!focusMode.active()) {
    <app-site-footer />
  }
</div>
