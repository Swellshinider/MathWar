<article>
  <header class="game-intro">
    <div>
      <p class="eyebrow">{{ eyebrow() }}</p>
      <h1>{{ title() }}</h1>
    </div>
    <div class="intro-actions">
      <p>{{ objective() }}</p>
    </div>
  </header>

  <div class="game-content">
    <ng-content />
  </div>

  <div class="game-hint">
    <ng-content select="[gameHint]" />
  </div>
</article>
