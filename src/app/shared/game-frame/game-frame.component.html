<article [class.wide]="wide()">
  <header class="game-intro">
    <div>
      @if (eyebrow()) {
        <p class="eyebrow">{{ eyebrow() }}</p>
      }
      <h1>{{ title() }}</h1>
    </div>
    <div class="intro-actions">
      @if (objective()) {
        <p>{{ objective() }}</p>
      }
      <ng-content select="[gameActions]" />
    </div>
  </header>

  <div class="game-content">
    <ng-content />
  </div>

  <div class="game-hint">
    <ng-content select="[gameHint]" />
  </div>
</article>
