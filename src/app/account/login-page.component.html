<section class="account-page">
  <div class="account-panel glass">
    <header>
      <p class="eyebrow">Account</p>
      <h1>Sign in</h1>
    </header>

    <form class="account-form" [formGroup]="form" (submit)="$event.preventDefault(); submit()">
      <label class="field-label" for="account-email">Email</label>
      <input
        id="account-email"
        class="field"
        type="email"
        autocomplete="email"
        formControlName="email"
      />

      <label class="field-label" for="account-password">Password</label>
      <input
        id="account-password"
        class="field"
        type="password"
        autocomplete="current-password"
        formControlName="password"
      />

      @if (auth.error()) {
        <p class="error" role="alert">{{ auth.error() }}</p>
      }

      <div class="account-actions">
        <button type="submit" class="btn btn--primary" [disabled]="submitting()">Sign in</button>
        <a class="btn btn--ghost" routerLink="/account/create">Create account</a>
      </div>
    </form>
  </div>
</section>
