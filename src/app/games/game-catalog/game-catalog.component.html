<section class="catalog">
  <header class="catalog-intro">
    <p class="eyebrow">Math mini-games</p>
    <h1>Choose a game</h1>
    <p>
      Short, focused rounds for graphing, arithmetic, and equation building. Pick a discipline and
      start playing.
    </p>
    <a class="btn btn--ghost" routerLink="/leaderboard/formula-frenzy">View leaderboard</a>
  </header>

  <div class="game-grid">
    @for (game of games; track game.id) {
      <a
        class="game-entry game-card"
        [class.game-entry--artillery]="game.id === 'equation-artillery'"
        [class.game-entry--frenzy]="game.id === 'formula-frenzy'"
        [class.game-entry--cross]="game.id === 'math-cross'"
        [routerLink]="game.route"
        [attr.aria-label]="'Play ' + game.title"
      >
        <div class="game-entry__media">
          <img
            class="game-card__preview"
            [src]="game.image"
            alt=""
            loading="lazy"
            (error)="$any($event.target).style.display = 'none'"
          />
        </div>
        <div class="game-entry__body">
          <span class="game-entry__topic">{{ game.eyebrow }}</span>
          <h2>{{ game.title }}</h2>
          <p>{{ game.summary }}</p>
          <span class="game-entry__cta">Play game <span aria-hidden="true">→</span></span>
        </div>
      </a>
    }
  </div>
</section>
