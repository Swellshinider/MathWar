<section class="catalog">
  <header>
    <p class="eyebrow">Math minigames</p>
    <p>Practice mathematical ideas through short, focused games.</p>
  </header>

  <div class="game-grid">
    @for (game of games; track game.id) {
      <a class="game-card" [routerLink]="game.route" [attr.aria-label]="'Play ' + game.title">
        <div class="game-card__media">
          <img
            class="game-card__preview"
            [src]="game.image"
            alt=""
            loading="lazy"
            (error)="$any($event.target).style.display = 'none'"
          />
        </div>
        <div class="game-card__body">
          <p class="game-topic">{{ game.eyebrow }}</p>
          <h2>{{ game.title }}</h2>
          <p class="game-card__summary">{{ game.summary }}</p>
          <span class="game-card__cta">Play {{ game.title }} →</span>
        </div>
      </a>
    }
  </div>
</section>
