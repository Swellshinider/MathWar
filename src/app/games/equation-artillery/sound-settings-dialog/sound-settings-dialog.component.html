<dialog #dialog aria-labelledby="sound-settings-title">
  <header>
    <h2 id="sound-settings-title">Sound</h2>
    <button
      type="button"
      class="btn btn--ghost"
      aria-label="Close sound settings"
      (click)="close()"
    >
      Close
    </button>
  </header>

  <div class="sound-controls">
    <label class="toggle">
      <input type="checkbox" [ngModel]="muted()" (ngModelChange)="setMuted($event)" />
      <span>Mute sound</span>
    </label>

    <label class="volume-control" for="sound-volume">
      <span>Volume</span>
      <input
        id="sound-volume"
        type="range"
        min="0"
        max="1"
        step="0.05"
        [ngModel]="volume()"
        (ngModelChange)="setVolume($event)"
      />
      <output for="sound-volume">{{ volume() | percent: '1.0-0' }}</output>
    </label>
  </div>
</dialog>
