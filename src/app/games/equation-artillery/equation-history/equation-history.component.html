<section class="glass" aria-labelledby="equation-history-title">
  <h2 id="equation-history-title">Equation history</h2>
  @if (equations().length === 0) {
    <p class="empty">Fired equations will appear here.</p>
  } @else {
    <ol #list role="log" aria-live="polite" aria-relevant="additions">
      @for (entry of equations(); track entry.id) {
        <li [class.mine]="entry.mine">
          <button
            type="button"
            [attr.aria-label]="'Use equation ' + entry.equation"
            (click)="selectEquation.emit(entry.equation)"
          >
            <span class="meta">
              <strong>{{ entry.senderName }}</strong>
              @if (entry.soldierName) {
                <span>{{ entry.soldierName }}</span>
              }
            </span>
            <code>f(x) = {{ entry.equation }}</code>
          </button>
        </li>
      }
    </ol>
  }
</section>
