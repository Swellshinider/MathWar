<app-game-frame title="Equation Artillery Multiplayer" [wide]="true">
  @if (!state()) {
    <app-multiplayer-lobby [manageSocket]="false" (roomJoined)="onRoomJoined($event)" />
  } @else {
    <div class="game-layout">
      <div class="game-column">
        <section class="match-meta">
          <strong>Room {{ state()?.roomCode }}</strong>
          <div class="match-toolbar">
            <button type="button" class="btn btn--subtle" (click)="shareRoomLink()">
              Share link
            </button>
            <button
              type="button"
              class="btn btn--subtle"
              [disabled]="activeShot()"
              (click)="requestLeave(confirmLeaveDialog)"
            >
              Leave match
            </button>
          </div>
        </section>
        <div class="play-layout">
          <div #boardAnchor class="board-anchor">
            <app-board
              [player]="playerForBoard()"
              [characters]="boardCharacters()"
              [targets]="opponentTarget()"
              [walls]="state()?.walls ?? []"
              [bullet]="bullet()"
              [trail]="trail()"
            >
              <button
                boardActions
                type="button"
                class="board-action"
                aria-label="Open equation help"
                aria-describedby="multiplayer-help-tooltip"
                aria-haspopup="dialog"
                (click)="helpDialog.open()"
              >
                <svg lucideCircleHelp aria-hidden="true"></svg>
                <span id="multiplayer-help-tooltip" class="board-action__tooltip" role="tooltip">
                  Help
                </span>
              </button>
            </app-board>
          </div>
          <form class="controls" (submit)="$event.preventDefault(); fire()">
            <label class="field-label" for="mp-equation">f(x)</label>
            <input
              id="mp-equation"
              class="field"
              name="equation"
              maxlength="180"
              [(ngModel)]="equation"
              placeholder="0.35x"
            />
            <button type="submit" class="btn btn--primary" [disabled]="!isMyTurn() || activeShot()">
              Fire
            </button>
          </form>
          <app-equation-history
            [equations]="equationHistory()"
            (selectEquation)="equation.set($event)"
          />
        </div>
        <p class="status" aria-live="polite">{{ status() }}</p>
      </div>
    </div>
  }
  @if (error()) {
    <p class="error" role="alert">{{ error() }}</p>
  }

  <app-equation-help-dialog #helpDialog />

  <dialog #confirmLeaveDialog aria-labelledby="leave-confirm-title">
    <div class="confirm-dialog">
      <h2 id="leave-confirm-title">Leave this match?</h2>
      <p>Your opponent is still in the match. You will return to the lobby.</p>
      <div class="confirm-dialog__actions">
        <button type="button" class="btn btn--subtle" (click)="cancelLeave(confirmLeaveDialog)">
          Stay
        </button>
        <button type="button" class="btn btn--primary" (click)="confirmLeave(confirmLeaveDialog)">
          Leave match
        </button>
      </div>
    </div>
  </dialog>
</app-game-frame>
