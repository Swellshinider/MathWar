<dialog #dialog aria-labelledby="equation-help-title">
  <header>
    <h2 id="equation-help-title">Equation help</h2>
    <button
      type="button"
      class="btn btn--ghost"
      aria-label="Close equation help"
      (click)="close()"
    >
      Close
    </button>
  </header>

  <div class="references">
    <app-function-reference title="Trigonometry" [functions]="trigonometryFunctions" />
    <app-function-reference
      title="Numbers and logs"
      [functions]="numericFunctions"
      [showSyntax]="true"
    />
  </div>
</dialog>
