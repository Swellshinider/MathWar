<app-game-frame eyebrow="Functions and graphs" title="Equation Artillery" [wide]="true">
  <div class="multiplayer-launch">
    <app-multiplayer-lobby (play)="enterMultiplayer()" />
  </div>

  <section class="mode-panel" aria-label="Offline mode">
    <div class="mode-panel__tabs" role="tablist" aria-label="Offline game modes">
      <button
        type="button"
        class="mode-tab"
        [class.mode-tab--active]="gameMode() === 'target-practice'"
        (click)="selectTargetPractice()"
      >
        Target Practice
      </button>
      <button
        type="button"
        class="mode-tab"
        [class.mode-tab--active]="gameMode() === 'single-player'"
        (click)="selectSinglePlayerMode()"
      >
        Single Player
      </button>
    </div>
    @if (gameMode() === 'single-player') {
      <div class="difficulty-control">
        <label for="cpu-difficulty">CPU level</label>
        <input
          id="cpu-difficulty"
          type="range"
          min="0"
          max="10"
          step="1"
          [value]="cpuDifficulty()"
          [disabled]="cpuDifficultyLocked()"
          (input)="cpuDifficulty.set($any($event.target).valueAsNumber)"
        />
        <output for="cpu-difficulty">{{ cpuDifficulty() }}</output>
        <button type="button" class="btn btn--subtle" (click)="startCpuMatch()">
          Start Single Player
        </button>
      </div>
    }
  </section>

  <div class="game-layout">
    <div class="board-row">
      <app-board
        [player]="playerForBoard()"
        [characters]="boardCharacters()"
        [targets]="targetsForBoard()"
        [walls]="wallsForBoard()"
        [bullet]="bullet()"
        [trail]="trail()"
      >
        <button
          boardActions
          type="button"
          class="board-action"
          aria-label="Open sound settings"
          aria-describedby="local-sound-tooltip"
          aria-haspopup="dialog"
          (click)="soundDialog.open()"
        >
          <svg lucideVolume2 aria-hidden="true"></svg>
          <span id="local-sound-tooltip" class="board-action__tooltip" role="tooltip">Sound</span>
        </button>
        <button
          boardActions
          type="button"
          class="board-action"
          aria-label="Open equation help"
          aria-describedby="local-help-tooltip"
          aria-haspopup="dialog"
          (click)="helpDialog.open()"
        >
          <svg lucideCircleHelp aria-hidden="true"></svg>
          <span id="local-help-tooltip" class="board-action__tooltip" role="tooltip">Help</span>
        </button>
      </app-board>

      <app-equation-history
        [equations]="equationHistory()"
        (selectEquation)="equation.set($event)"
      />
    </div>

    <app-equation-controls
      [(equation)]="equation"
      [active]="controlsActive()"
      [roundComplete]="roundComplete()"
      [error]="error()"
      [status]="status()"
      (fire)="fire($event)"
      (newRound)="newRound()"
    />
  </div>

  <app-equation-help-dialog #helpDialog />
  <app-sound-settings-dialog #soundDialog />

  <p gameHint>
    Equations use board-coordinate x and launch from the player. Walls stop shots but lose pieces
    around an impact. Try
    <code>0.35x</code>, <code>sin(x)</code>, or <code>0.08x^2</code>.
  </p>
</app-game-frame>
