<app-game-frame eyebrow="Functions and graphs" title="Equation Artillery" [wide]="true">
  <div class="multiplayer-launch">
    <app-multiplayer-lobby (roomJoined)="enterMultiplayer()" />
  </div>

  <section class="mode-panel" aria-label="Offline mode">
    <div class="mode-panel__tabs" role="tablist" aria-label="Offline game modes">
      <button
        type="button"
        class="mode-tab"
        [class.mode-tab--active]="gameMode() === 'target-practice'"
        (click)="selectTargetPractice()"
      >
        Target Practice
      </button>
      <button
        type="button"
        class="mode-tab"
        [class.mode-tab--active]="gameMode() === 'free-practice'"
        (click)="selectFreePractice()"
      >
        Free Practice
      </button>
      <button
        type="button"
        class="mode-tab"
        [class.mode-tab--active]="gameMode() === 'single-player'"
        (click)="selectSinglePlayerMode()"
      >
        CPU vs.
      </button>
    </div>
    @if (gameMode() === 'single-player') {
      <div class="difficulty-control">
        <label for="cpu-difficulty">CPU level</label>
        <input
          id="cpu-difficulty"
          type="range"
          min="0"
          max="10"
          step="1"
          [value]="cpuDifficulty()"
          [disabled]="cpuDifficultyLocked()"
          (input)="cpuDifficulty.set($any($event.target).valueAsNumber)"
        />
        <output for="cpu-difficulty">{{ cpuDifficulty() }}</output>
        <button type="button" class="btn btn--subtle" (click)="startCpuMatch()">
          Start CPU vs.
        </button>
      </div>
    }
  </section>

  <div class="game-layout">
    @if (gameMode() === 'free-practice') {
      <section class="sandbox-tools" aria-label="Free Practice sandbox tools">
        <div class="sandbox-tools__group" role="group" aria-label="Board tool">
          <button
            type="button"
            class="tool-button"
            [class.tool-button--active]="selectedSandboxTool() === 'move'"
            aria-label="Move player"
            (click)="selectedSandboxTool.set('move')"
          >
            <svg lucideMove aria-hidden="true"></svg>
            <span class="tool-button__label">Move</span>
          </button>
          <button
            type="button"
            class="tool-button"
            [class.tool-button--active]="selectedSandboxTool() === 'enemy'"
            aria-label="Place enemy"
            (click)="selectedSandboxTool.set('enemy')"
          >
            <svg lucideTarget aria-hidden="true"></svg>
            <span class="tool-button__label">Enemy</span>
          </button>
          <button
            type="button"
            class="tool-button"
            [class.tool-button--active]="selectedSandboxTool() === 'wall'"
            aria-label="Place wall"
            (click)="selectedSandboxTool.set('wall')"
          >
            <svg lucideBrickWall aria-hidden="true"></svg>
            <span class="tool-button__label">Wall</span>
          </button>
          <button
            type="button"
            class="tool-button"
            [class.tool-button--active]="selectedSandboxTool() === 'delete'"
            aria-label="Delete nearest object"
            (click)="selectedSandboxTool.set('delete')"
          >
            <svg lucideTrash2 aria-hidden="true"></svg>
            <span class="tool-button__label">Delete</span>
          </button>
        </div>

        <div class="sandbox-tools__group" role="group" aria-label="Wall shape">
          <button
            type="button"
            class="icon-button"
            [class.icon-button--active]="selectedWallShape() === 'vertical'"
            aria-label="Vertical wall"
            [disabled]="selectedSandboxTool() !== 'wall'"
            (click)="selectedWallShape.set('vertical')"
          >
            <svg lucideBrickWall aria-hidden="true"></svg>
          </button>
          <button
            type="button"
            class="icon-button"
            [class.icon-button--active]="selectedWallShape() === 'circle'"
            aria-label="Circle wall"
            [disabled]="selectedSandboxTool() !== 'wall'"
            (click)="selectedWallShape.set('circle')"
          >
            <svg lucideCircle aria-hidden="true"></svg>
          </button>
          <button
            type="button"
            class="icon-button"
            [class.icon-button--active]="selectedWallShape() === 'square'"
            aria-label="Square wall"
            [disabled]="selectedSandboxTool() !== 'wall'"
            (click)="selectedWallShape.set('square')"
          >
            <svg lucideSquare aria-hidden="true"></svg>
          </button>
          <button
            type="button"
            class="icon-button"
            [class.icon-button--active]="selectedWallShape() === 'triangle'"
            aria-label="Triangle wall"
            [disabled]="selectedSandboxTool() !== 'wall'"
            (click)="selectedWallShape.set('triangle')"
          >
            <svg lucideTriangle aria-hidden="true"></svg>
          </button>
        </div>

        <div class="sandbox-tools__group sandbox-tools__sizes" role="group" aria-label="Wall size">
          <button
            type="button"
            class="size-button"
            [class.size-button--active]="selectedWallSize() === 'small'"
            [disabled]="selectedSandboxTool() !== 'wall'"
            (click)="selectedWallSize.set('small')"
          >
            S
          </button>
          <button
            type="button"
            class="size-button"
            [class.size-button--active]="selectedWallSize() === 'medium'"
            [disabled]="selectedSandboxTool() !== 'wall'"
            (click)="selectedWallSize.set('medium')"
          >
            M
          </button>
          <button
            type="button"
            class="size-button"
            [class.size-button--active]="selectedWallSize() === 'large'"
            [disabled]="selectedSandboxTool() !== 'wall'"
            (click)="selectedWallSize.set('large')"
          >
            L
          </button>
        </div>
      </section>
    }

    <div class="play-layout">
      <div #boardAnchor class="board-anchor">
        <app-board
          [player]="playerForBoard()"
          [characters]="boardCharacters()"
          [targets]="targetsForBoard()"
          [walls]="wallsForBoard()"
          [bullet]="bullet()"
          [previewTrail]="previewTrail()"
          [trail]="trail()"
          [visibleTrailPointCount]="visibleTrailPointCount()"
          [movementEnabled]="movementEnabled()"
          [pointSelectionEnabled]="pointSelectionEnabled()"
          (boardPoint)="handleFreePracticeBoardPoint($event)"
        >
          <button
            boardActions
            type="button"
            class="board-action"
            aria-label="Open equation help"
            aria-describedby="local-help-tooltip"
            aria-haspopup="dialog"
            (click)="helpDialog.open()"
          >
            <svg lucideCircleHelp aria-hidden="true"></svg>
            <span id="local-help-tooltip" class="board-action__tooltip" role="tooltip">Help</span>
          </button>
        </app-board>
      </div>

      <div class="controls-row">
        <app-equation-controls
          [(equation)]="equation"
          [active]="controlsActive()"
          [roundComplete]="roundComplete()"
          [error]="error()"
          [status]="status()"
          [showPreview]="gameMode() !== 'free-practice'"
          (fire)="fire($event)"
          (newRound)="newRound()"
        />
      </div>

      <app-equation-history
        [equations]="equationHistory()"
        (selectEquation)="equation.set($event)"
      />
    </div>
  </div>

  <app-equation-help-dialog #helpDialog />

  <p gameHint>
    Equations use board-coordinate x and launch from the player. Walls stop shots but lose pieces
    around an impact. Try
    <code>0.35x</code>, <code>sin(x)</code>, or <code>0.08x^2</code>.
  </p>
</app-game-frame>
