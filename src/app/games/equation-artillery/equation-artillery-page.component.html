<app-game-frame
  eyebrow="Functions and graphs"
  title="Equation Artillery"
  objective="Shape a function to guide the shot through every target."
  [wide]="true"
>
  <a gameActions class="btn btn--ghost" href="/games/equation-artillery/multiplayer"> Play 1v1 </a>
  <button
    gameActions
    type="button"
    class="btn btn--ghost"
    aria-haspopup="dialog"
    (click)="soundDialog.open()"
  >
    Sound
  </button>
  <button
    gameActions
    type="button"
    class="btn btn--ghost"
    aria-haspopup="dialog"
    (click)="helpDialog.open()"
  >
    Help
  </button>

  <div class="game-layout">
    <div class="game-column">
      <app-board
        [player]="player()"
        [targets]="targets()"
        [walls]="walls()"
        [bullet]="bullet()"
        [trail]="trail()"
      />

      <app-equation-controls
        [(equation)]="equation"
        [active]="active()"
        [roundComplete]="roundComplete()"
        [error]="error()"
        [status]="status()"
        (fire)="fire($event)"
        (newRound)="newRound()"
      />
    </div>

    <app-equation-history [equations]="equationHistory()" (selectEquation)="equation.set($event)" />
  </div>

  <app-equation-help-dialog #helpDialog />
  <app-sound-settings-dialog #soundDialog />

  <p gameHint>
    Equations use board-coordinate x and launch from the player. Walls stop shots but lose pieces
    around an impact. Try
    <code>0.35x</code>, <code>sin(x)</code>, or <code>0.08x^2</code>.
  </p>
</app-game-frame>
