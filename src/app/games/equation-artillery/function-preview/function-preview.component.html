<section aria-labelledby="function-preview-title">
  <header>
    <h2 id="function-preview-title">Function shape</h2>
    <span class="info">
      <button
        type="button"
        class="info-button"
        aria-label="About the function shape preview"
        aria-describedby="function-preview-note"
      >
        ?
      </button>
      <span id="function-preview-note" class="info-tooltip" role="tooltip">
        Preview is stretched to show the function shape clearly. Shots still start at the player
        and use the board scale, so the fired path can look different.
      </span>
    </span>
  </header>
  <div class="preview-frame">
    @if (preview().available) {
      <svg viewBox="0 0 240 100" role="img" [attr.aria-label]="accessibleLabel()">
        <path class="shadow" [attr.d]="preview().path" />
        <path [attr.d]="preview().path" />
      </svg>
    } @else {
      <p>Complete the function to preview its shape.</p>
    }
  </div>
</section>
