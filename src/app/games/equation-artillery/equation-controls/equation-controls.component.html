<div class="controls-layout" [class.controls-layout--full]="!showPreview()">
  <div class="control-content">
    <form (submit)="submit($event)">
      <label for="equation">Trajectory equation</label>
      <div class="entry-row">
        <span class="prefix" aria-hidden="true">f(x) =</span>
        <input
          id="equation"
          class="field"
          [formControl]="equationControl"
          autocomplete="off"
          spellcheck="false"
        />
        <button
          type="submit"
          class="btn btn--primary"
          [disabled]="active() || equationControl.invalid || roundComplete()"
        >
          Fire
        </button>
        @if (roundComplete()) {
          <button type="button" class="btn btn--ghost" (click)="newRound.emit()">New Round</button>
        }
      </div>
      @if (showPreview()) {
        <app-function-preview [equation]="equationValue()" />
      }
    </form>
    <p class="status" aria-live="polite">{{ status() }}</p>
    @if (error()) {
      <p class="error" role="alert">{{ error() }}</p>
    }
  </div>
</div>
