<app-game-frame
  eyebrow="Arithmetic sprint"
  title="Formula Frenzy"
  objective="Solve fast. Keep up as the formulas get harder."
>
  <section class="frenzy-surface" aria-label="Formula Frenzy game">
    <div class="stats" aria-label="Run stats">
      <span>Score {{ score() }}</span>
      <span>Level {{ problem().level }}</span>
      <span>Time {{ timeRemaining() }}</span>
    </div>

    <div class="problem-panel">
      <p class="problem-prompt">{{ problem().prompt }}</p>
      <form (submit)="submitAnswer($event)">
        <label for="formula-answer">Answer</label>
        <div class="answer-row">
          <input
            id="formula-answer"
            type="text"
            inputmode="decimal"
            autocomplete="off"
            [formControl]="answerControl"
            [disabled]="gameOver()"
          />
        </div>
      </form>
      @if (error()) {
        <p class="error" role="alert">{{ error() }}</p>
      }
    </div>

    @if (gameOver()) {
      <div class="game-over" role="dialog" aria-labelledby="formula-game-over-title">
        <h2 id="formula-game-over-title">Time up</h2>
        <p>Score {{ score() }}</p>
        <p>Average {{ averageSolveTime() }}</p>
        <button type="button" class="btn restart-button" (click)="restart()">Restart</button>
      </div>
    }
  </section>

  <p gameHint>Each correct answer raises your score. The deadline gets tighter as you climb.</p>
</app-game-frame>
